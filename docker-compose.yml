# ============================================================
# AntiGravity v2.0 — Development Docker Compose
# Starts: MongoDB replica set, Redis, Kafka, Qdrant, Temporal
# ============================================================

x-common-env: &common-env
  ENVIRONMENT: development
  MONGODB_URI: mongodb://mongo1:27017,mongo2:27017,mongo3:27017/antigravity_development?replicaSet=rs0
  REDIS_URL: redis://redis:6379
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  KAFKA_SECURITY_PROTOCOL: PLAINTEXT
  QDRANT_URL: http://qdrant:6333
  TEMPORAL_HOST: temporal
  TEMPORAL_PORT: 7233

services:
  # ── MongoDB Replica Set (3 nodes — required for Change Streams) ──────────
  mongo1:
    image: mongo:7
    container_name: ag_mongo1
    command: mongod --replSet rs0 --port 27017 --bind_ip_all
    volumes:
      - mongo1_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ag_network

  mongo2:
    image: mongo:7
    container_name: ag_mongo2
    command: mongod --replSet rs0 --port 27017 --bind_ip_all
    volumes:
      - mongo2_data:/data/db
    networks:
      - ag_network

  mongo3:
    image: mongo:7
    container_name: ag_mongo3
    command: mongod --replSet rs0 --port 27017 --bind_ip_all
    volumes:
      - mongo3_data:/data/db
    networks:
      - ag_network

  # Init container — sets up the replica set
  mongo-init:
    image: mongo:7
    container_name: ag_mongo_init
    depends_on:
      mongo1:
        condition: service_healthy
    command: >
      mongosh --host mongo1:27017 --eval "
        try {
          if (!rs.status().ok || rs.status().code === 94) {
            rs.initiate({
              _id: 'rs0',
              members: [
                {_id: 0, host: 'mongo1:27017', priority: 2},
                {_id: 1, host: 'mongo2:27017', priority: 1},
                {_id: 2, host: 'mongo3:27017', priority: 1}
              ]
            });
            console.log('Replica set initialized');
          } else {
            console.log('Replica set already initialized');
          }
        } catch (e) {
          if (e.message.includes('already initialized')) {
            console.log('Replica set already initialized');
          } else {
            rs.initiate({
              _id: 'rs0',
              members: [
                {_id: 0, host: 'mongo1:27017', priority: 2},
                {_id: 1, host: 'mongo2:27017', priority: 1},
                {_id: 2, host: 'mongo3:27017', priority: 1}
              ]
            });
          }
        }
      "
    networks:
      - ag_network
    restart: on-failure

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ag_redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ag_network

  # ── Kafka (via Zookeeper) ───────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: ag_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - ag_network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ag_kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ag_network

  # ── Qdrant (Vector DB) ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: ag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ag_network

  # ── Temporal ─────────────────────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: ag_temporal
    depends_on:
      - temporal-postgresql
    ports:
      - "7233:7233"
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgresql
    networks:
      - ag_network

  temporal-postgresql:
    image: postgres:16-alpine
    container_name: ag_temporal_postgres
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal_pg_data:/var/lib/postgresql/data
    networks:
      - ag_network

  temporal-ui:
    image: temporalio/ui:2.28.0
    container_name: ag_temporal_ui
    depends_on:
      - temporal
    ports:
      - "8088:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    networks:
      - ag_network

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ag_backend
    depends_on:
      mongo1:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      AES_MASTER_KEY: ${AES_MASTER_KEY:-dev_key_change_me_32_chars_min}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ag_network

  # ── Temporal Worker ───────────────────────────────────────────────────────
  temporal-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ag_temporal_worker
    depends_on:
      - backend
      - temporal
    environment:
      <<: *common-env
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      AES_MASTER_KEY: ${AES_MASTER_KEY:-dev_key_change_me_32_chars_min}
    volumes:
      - ./backend:/app
    command: python -m temporal.worker
    networks:
      - ag_network

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ag_frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - ag_network

networks:
  ag_network:
    driver: bridge

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_logs:
  qdrant_data:
  temporal_pg_data: